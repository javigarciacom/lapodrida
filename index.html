<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-PSV6VVZG');</script>
  <!-- End Google Tag Manager -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#072a0e">
  <title>La Podrida – Juego de Cartas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PSV6VVZG"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- Difficulty modal -->
  <div id="difficulty-modal">
    <div class="dm-box">
      <span id="difficulty-close" aria-label="Cerrar">&times;</span>
      <h1 class="dm-title">La Podrida</h1>
      <p class="dm-subtitle">Juego de cartas · 4 jugadores</p>
      <p class="dm-label">Elige la dificultad de la IA</p>
      <div class="dm-options">
        <button class="dm-btn dm-easy" data-diff="easy">
          <span class="dm-btn-icon">♠</span>
          <span class="dm-btn-name">Fácil</span>
          <span class="dm-btn-desc">La IA comete errores</span>
        </button>
        <button class="dm-btn dm-medium" data-diff="medium">
          <span class="dm-btn-icon">♦</span>
          <span class="dm-btn-name">Medio</span>
          <span class="dm-btn-desc">Partida equilibrada</span>
        </button>
        <button class="dm-btn dm-hard" data-diff="hard">
          <span class="dm-btn-icon">♣</span>
          <span class="dm-btn-name">Difícil</span>
          <span class="dm-btn-desc">La IA juega al máximo</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div id="game">
    <!-- Top bar -->
    <div id="top-bar">
      <button id="new-game">Nueva Partida</button>
      <div id="message"></div>
      <button id="scoreboard-button">Puntuación</button>
    </div>

    <!-- Player info boxes -->
    <div id="info-north" class="player-info"></div>
    <div id="info-east" class="player-info"></div>
    <div id="info-west" class="player-info"></div>

    <!-- Table background (desktop only) -->
    <img id="table-bg" src="img/fondoiPocha-hd.png" alt="" draggable="false">

    <!-- Trick area (center table) -->
    <div id="trick-area"></div>

    <!-- Bid area -->
    <div id="bid-area"></div>

    <!-- Player hand -->
    <div id="player-hand"></div>

    <!-- Game info box: aligned horizontally with info-west, vertically with info-south.
         Three rows mirroring the player-info layout (name / score / stats). -->
    <div id="game-info-box" class="player-info">
      <div class="player-name gi-tricks">-/-</div>
      <div class="player-score gi-round">-/-</div>
      <div class="player-stats gi-trump-row"><div class="gi-trump">-</div></div>
    </div>

    <!-- Trump card: floats behind the dealer's info box (positioned by JS) -->
    <div id="trump-card" class="hidden"></div>

    <!-- South (human) info: positioned absolutely so it aligns with info-east -->
    <div id="info-south" class="player-info"></div>
  </div>

  <!-- Scoreboard overlay -->
  <div id="scoreboard-overlay">
    <div id="scoreboard-box">
      <span id="scoreboard-close">&times;</span>
      <h2 id="scoreboard-title">Puntuación</h2>
      <div id="scoreboard-content"></div>
    </div>
  </div>

  <!-- Sim log -->
  <div id="sim-log">
    <div id="sim-log-header">
      <span>AI Log</span>
      <span id="sim-log-close">&times;</span>
    </div>
    <div id="sim-log-body"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
